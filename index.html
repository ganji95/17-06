<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un repas chez Cédric Grolet</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: radial-gradient(circle at center, #ffe9d6, #f5d3b5, #e8bfa0);
    overflow: hidden;
}

/* fond animé léger */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1px);
    background-size: 70px 70px;
    animation: floatBg 25s linear infinite;
    opacity: 0.5;
}

@keyframes floatBg {
    from { transform: translate(0,0); }
    to { transform: translate(-150px,-150px); }
}

/* particules douces supplémentaires */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: rise linear infinite;
}

@keyframes rise {
    from { transform: translateY(100vh) scale(0.5); opacity: 0; }
    to { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.container {
    text-align: center;
    z-index: 2;
    animation: fadeIn 2s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* cœur avec respiration */
.heart {
    font-size: 80px;
    color: #e60023;
    text-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: pulse 2.5s infinite ease-in-out;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.12); filter: brightness(1.2); }
}

h1 {
    margin-top: 20px;
    font-size: 28px;
    color: #6b2d2d;
}

h2 {
    font-size: 64px;
    margin: 10px 0;
    color: #5a1f1f;
    transition: transform 0.2s ease;
}

.decor {
    width: 200px;
    height: 2px;
    margin: 20px auto;
    background: linear-gradient(to right, transparent, #b8865b, transparent);
    position: relative;
}

.decor::after {
    content: "❦";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: -10px;
    color: #b8865b;
}

/* petit effet hover subtil */
.container:hover h2 {
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="container">
    <div class="heart">❤️</div>
    <h1>Un repas chez</h1>
    <h2>Cédric Grolet</h2>
    <div class="decor"></div>
</div>

<script>
// création de particules douces
for (let i = 0; i < 25; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(p);
}

// léger mouvement parallax souris
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;

    document.querySelector(".container").style.transform =
        `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
